name: release dockerimage and update kubernetes manifests

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: msb_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d msb_bot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Execute tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/msb_bot_test
        run: |
          bun run db:migrate
          bun test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/msb-bot:latest
            ghcr.io/${{ github.repository_owner }}/msb-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes Manifests
        run: |
          sed -i 's|image: ghcr.io/.*/msb-bot:.*|image: ghcr.io/${{ github.repository_owner }}/msb-bot:${{ github.sha }}|' k8s/deployment.yaml
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add k8s/deployment.yaml
          git commit -m "chore: update Kubernetes manifests with image tag ${{ github.sha }}" || echo "No changes to commit"
          git push
